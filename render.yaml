services:
  - type: web
    name: wealth-tracker-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wealth-tracker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: wealth-tracker-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: wealth-tracker-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: wealth-tracker-backend
          property: url

  - type: worker
    name: celery-worker
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A tasks worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wealth-tracker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: wealth-tracker-redis
          property: connectionString

databases:
  - name: wealth-tracker-db
    databaseName: wealth_tracker
    user: admin
    plan: free

redis:
  - name: wealth-tracker-redis
    plan: free
    maxMemoryPolicy: noeviction
